<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reading Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0e3c4;
      background-image:
        repeating-linear-gradient(
          0deg, transparent 0px, transparent 27px,
          rgba(100,70,30,0.06) 27px, rgba(100,70,30,0.06) 28px
        );
      font-family: 'Kalam', cursive;
      padding: 48px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      text-align: center;
      position: relative;
    }

    .header-tape {
      position: absolute;
      top: -14px; left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 90px; height: 20px;
      background: rgba(240,180,100,0.55);
      border-radius: 2px;
      pointer-events: none;
    }

    .header h1 {
      font-family: 'Caveat', cursive;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      color: #2c1a0e;
      line-height: 1.1;
      font-weight: 700;
    }

    .header p {
      font-family: 'Kalam', cursive;
      font-size: 1rem;
      color: #2c1a0e;
      opacity: 0.5;
      margin-top: 6px;
      font-style: italic;
    }

    .header-deco {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
    }
    .header-deco span {
      font-size: 1.3rem;
      opacity: 0.35;
    }
    .header-line {
      width: 60px;
      height: 1.5px;
      background: rgba(44,26,14,0.2);
    }

    /* ── Shelf ──────────────────────────────────────────── */
    .shelf {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      max-width: 900px;
    }

    /* ── Book card ──────────────────────────────────────── */
    .book-card {
      width: 155px;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: #2c1a0e;
      transform: rotate(var(--rot, -1deg));
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
    }
    .book-card:hover {
      transform: rotate(0deg) translateY(-6px);
      z-index: 2;
    }

    .card-cover {
      width: 100%;
      aspect-ratio: 2 / 3;
      border: 2.5px solid #2c1a0e;
      border-radius: 3px 5px 5px 3px;
      overflow: hidden;
      background: #f8f2e4;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 0 rgba(44,26,14,0.25), 0 8px 20px rgba(44,26,14,0.15);
      position: relative;
    }
    .book-card:hover .card-cover {
      box-shadow: 6px 6px 0 rgba(44,26,14,0.3), 0 12px 28px rgba(44,26,14,0.2);
    }

    /* spine line */
    .card-cover::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: linear-gradient(to right, rgba(44,26,14,0.15), transparent);
      pointer-events: none;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .card-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.3;
    }
    .card-placeholder span { font-size: 2rem; }
    .card-placeholder small {
      font-family: 'Caveat', cursive;
      font-size: 0.72rem;
      letter-spacing: 1px;
    }

    /* washi tape on card */
    .card-tape {
      position: absolute;
      top: -8px; left: 50%;
      transform: translateX(-50%) rotate(var(--tape-rot, 2deg));
      width: 46px; height: 17px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 1;
    }

    .card-info {
      padding: 9px 4px 4px;
    }
    .card-title {
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      font-weight: 600;
      color: #2c1a0e;
      line-height: 1.25;
    }
    .card-author {
      font-family: 'Kalam', cursive;
      font-size: 0.78rem;
      color: #2c1a0e;
      opacity: 0.5;
      margin-top: 2px;
    }
    .card-open {
      font-family: 'Caveat', cursive;
      font-size: 0.78rem;
      color: #2c1a0e;
      opacity: 0;
      margin-top: 5px;
      transition: opacity 0.2s;
      letter-spacing: 1px;
    }
    .book-card:hover .card-open { opacity: 0.5; }

    /* ── Add card ───────────────────────────────────────── */
    .add-card {
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s, transform 0.25s ease;
    }
    .add-card:hover { opacity: 1; transform: rotate(0deg) translateY(-4px); }

    .add-cover {
      border: 2.5px dashed rgba(44,26,14,0.4) !important;
      box-shadow: none !important;
      flex-direction: column;
      gap: 6px;
      background: transparent !important;
    }
    .add-cover::before { display: none; }

    .add-icon {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      color: #2c1a0e;
      opacity: 0.5;
      line-height: 1;
    }
    .add-label {
      font-family: 'Caveat', cursive;
      font-size: 0.82rem;
      color: #2c1a0e;
      opacity: 0.45;
      letter-spacing: 1px;
    }

    /* tooltip for add card */
    .add-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: #2c1a0e;
      color: #f8f2e4;
      font-family: 'Caveat', cursive;
      font-size: 0.82rem;
      white-space: nowrap;
      padding: 5px 12px;
      border-radius: 4px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 10;
    }
    .add-tooltip::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #2c1a0e;
    }
    .add-card:hover .add-tooltip { display: block; }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      font-family: 'Caveat', cursive;
      font-size: 0.85rem;
      color: #2c1a0e;
      opacity: 0.3;
      letter-spacing: 2px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .shelf { gap: 20px; }
      .book-card { width: 130px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-tape"></div>
    <h1>My Reading Notes</h1>
    <p>a little library of thoughts ♡</p>
    <div class="header-deco">
      <div class="header-line"></div>
      <span>📚</span>
      <div class="header-line"></div>
    </div>
  </header>

  <div class="shelf" id="shelf">

    <!-- ── Clear Thinking ── -->
    <a class="book-card" href="index.html"
       style="--rot: -1.5deg"
       data-cover-key="cover:index.html"
       data-cover-fallback="images/cover.png">
      <div class="card-tape" style="background:rgba(224,123,84,0.5);--tape-rot:-3deg"></div>
      <div class="card-cover">
        <img class="card-img" src="" alt="Clear Thinking">
        <div class="card-placeholder"><span>📖</span><small>NO COVER</small></div>
      </div>
      <div class="card-info">
        <div class="card-title">Clear Thinking</div>
        <div class="card-author">Shane Parrish</div>
        <div class="card-open">open notes →</div>
      </div>
    </a>

    <!-- ── Add new book card ── -->
    <div class="book-card add-card" style="--rot:1deg"
         onclick="window.open('NEW-BOOK.md','_blank')">
      <div class="add-tooltip">see NEW-BOOK.md to add</div>
      <div class="card-cover add-cover">
        <div class="add-icon">＋</div>
        <div class="add-label">new book</div>
      </div>
      <div class="card-info">
        <div class="card-title" style="opacity:0.35">add a book</div>
      </div>
    </div>

  </div>

  <footer class="footer">reading notes · 2025</footer>

  <script>
    function loadCardCover(card) {
      const img         = card.querySelector('.card-img');
      const placeholder = card.querySelector('.card-placeholder');

      function showImg(src) {
        img.src = src;
        img.style.display = 'block';
        if (placeholder) placeholder.style.display = 'none';
      }

      const saved    = localStorage.getItem(card.dataset.coverKey);
      const fallback = card.dataset.coverFallback;

      if (saved) {
        showImg(saved);
      } else if (fallback) {
        const test = new Image();
        test.onload = () => showImg(fallback);
        test.onerror = () => {};
        test.src = fallback;
      }
    }

    const cards = document.querySelectorAll('[data-cover-key]');
    cards.forEach(loadCardCover);

    // Auto-update when another tab saves a new cover
    window.addEventListener('storage', e => {
      cards.forEach(card => {
        if (e.key === card.dataset.coverKey) loadCardCover(card);
      });
    });

    // Auto-reload when user switches back to this tab
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) cards.forEach(loadCardCover);
    });
  </script>

</body>
</html>
